name: publish
run-name: Publish ${{ inputs.version }}

on:
  release:
    types: [released]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        name: Checkout
      - uses: actions/setup-node@v6
        name: Setup Node.js
        with:
          node-version: lts/*
      - run: npm ci
        name: Install
      - run: npm run build
        name: Build
      - uses: actions/upload-artifact@v7
        with:
          name: extensions
          path: build/

  publish-chrome:
    name: Chrome publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: extensions
          path: .
      - uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          extension-id: iecgbpoggpmlohjeojnjjihabobaaeek
          file-path: chrome-extension.zip
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

  publish-firefox:
    name: Firefox publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: extensions
          path: .
      - uses: wdzeng/firefox-addon@v1
        with:
          addon-guid: roman@lerchster.dev
          xpi-path: firefox-extension.zip
          jwt-issuer: ${{ secrets.FIREFOX_API_KEY }}
          jwt-secret: ${{ secrets.FIREFOX_API_SECRET }}
